name: Validate Repository

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate metadata and provider count
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Count provider modules
        run: |
          python scripts/count_providers.py
          python scripts/count_providers.py --json > provider-count.json

      - name: Validate repository metadata
        run: |
          python scripts/validate_metadata.py
          python scripts/validate_metadata.py --json > metadata-validation.json

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repository-validation
          path: |
            provider-count.json
            metadata-validation.json
