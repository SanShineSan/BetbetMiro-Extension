name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: src

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: builds
          path: builds

      - name: Detect changed plugins
        id: changed
        run: |
          cd $GITHUB_WORKSPACE/src

          echo "=== Changed Files ==="
          git diff --name-only HEAD^ HEAD

          # Memeriksa apakah ada perubahan pada konfigurasi global dasar
          global_change=false
          if git diff --name-only HEAD^ HEAD | grep -E "^(build\.gradle\.kts|settings\.gradle\.kts|gradle\.properties|\.github/)"; then
            global_change=true
          fi

          # Mendata seluruh provider aktif yang tersedia di dalam proyek
          all_plugins=""
          for dir in *; do
            if [ -d "$dir" ] && [ -f "$dir/build.gradle.kts" ] && [ "$dir" != "buildSrc" ]; then
              all_plugins="$all_plugins $dir"
            fi
          done
          all_plugins=$(echo $all_plugins | xargs)

          if [ "$global_change" = "true" ]; then
            echo "Global configuration changed. Rebuilding all plugins."
            plugins="$all_plugins"
          else
            # Mengambil nama folder utama dari berkas-berkas yang dimodifikasi
            changed_dirs=$(git diff --name-only HEAD^ HEAD | awk -F/ '{print $1}' | sort -u)
            plugins=""
            for dir in $changed_dirs; do
              if [ -d "$dir" ] && [ -f "$dir/build.gradle.kts" ] && [ "$dir" != "buildSrc" ]; then
                plugins="$plugins $dir"
              fi
            done
            plugins=$(echo $plugins | xargs)
          fi

          echo "Detected plugins to build: $plugins"
          echo "plugins=$plugins" >> $GITHUB_OUTPUT
          echo "all_plugins=$all_plugins" >> $GITHUB_OUTPUT

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Access Secrets
        env:
          CRUNCHYROLL_BASIC_TOKEN: ${{ secrets.CRUNCHYROLL_BASIC_TOKEN }}
          CRUNCHYROLL_REFRESH_TOKEN: ${{ secrets.CRUNCHYROLL_REFRESH_TOKEN }}
          ANICHI_API: ${{ secrets.ANICHI_API }}
          ANICHI_SERVER: ${{ secrets.ANICHI_SERVER }}
          ANICHI_ENDPOINT: ${{ secrets.ANICHI_ENDPOINT }}
          ANICHI_APP: ${{ secrets.ANICHI_APP }}
          ZSHOW_API: ${{ secrets.ZSHOW_API }}
          SFMOVIES_API: ${{ secrets.SFMOVIES_API }}
          CINEMATV_API: ${{ secrets.CINEMATV_API }}
          GHOSTX_API: ${{ secrets.GHOSTX_API }}
          SUPERSTREAM_FIRST_API: ${{ secrets.SUPERSTREAM_FIRST_API }}
          SUPERSTREAM_SECOND_API: ${{ secrets.SUPERSTREAM_SECOND_API }}
          SUPERSTREAM_THIRD_API: ${{ secrets.SUPERSTREAM_THIRD_API }}
          SUPERSTREAM_FOURTH_API: ${{ secrets.SUPERSTREAM_FOURTH_API }}
        run: |
          cd $GITHUB_WORKSPACE/src

          echo TMDB_API=${{ secrets.TMDB_API }} >> local.properties
          echo DUMP_API=${{ secrets.DUMP_API }} >> local.properties
          echo DUMP_KEY=${{ secrets.DUMP_KEY }} >> local.properties
          echo FanCode_API=${{ secrets.FanCode_API }} >> local.properties
          echo FlixHQAPI=${{ secrets.FlixHQAPI }} >> local.properties

          echo CRUNCHYROLL_BASIC_TOKEN=$CRUNCHYROLL_BASIC_TOKEN >> local.properties
          echo CRUNCHYROLL_REFRESH_TOKEN=$CRUNCHYROLL_REFRESH_TOKEN >> local.properties

          echo ANICHI_API=$ANICHI_API >> local.properties
          echo ANICHI_SERVER=$ANICHI_SERVER >> local.properties
          echo ANICHI_ENDPOINT=$ANICHI_ENDPOINT >> local.properties
          echo ANICHI_APP=$ANICHI_APP >> local.properties

          echo ZSHOW_API=$ZSHOW_API >> local.properties
          echo SFMOVIES_API=$SFMOVIES_API >> local.properties
          echo CINEMATV_API=$CINEMATV_API >> local.properties
          echo GHOSTX_API=$GHOSTX_API >> local.properties

          echo SUPERSTREAM_FIRST_API=$SUPERSTREAM_FIRST_API >> local.properties
          echo SUPERSTREAM_SECOND_API=$SUPERSTREAM_SECOND_API >> local.properties
          echo SUPERSTREAM_THIRD_API=$SUPERSTREAM_THIRD_API >> local.properties
          echo SUPERSTREAM_FOURTH_API=$SUPERSTREAM_FOURTH_API >> local.properties

      - name: Build Changed Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew

          plugins="${{ steps.changed.outputs.plugins }}"
          all_plugins="${{ steps.changed.outputs.all_plugins }}"

          if [ -z "$plugins" ]; then
            echo "No plugin changes detected."
            exit 0
          fi

          # Langkah 1: Memulihkan berkas binary .cs3 lama milik provider yang TIDAK berubah
          for plugin in $all_plugins; do
            if [[ ! " $plugins " =~ " $plugin " ]]; then
              echo "Restoring cached binary for unchanged plugin: $plugin"
              mkdir -p "$plugin/build"
              if [ -f "$GITHUB_WORKSPACE/builds/$plugin.cs3" ]; then
                cp "$GITHUB_WORKSPACE/builds/$plugin.cs3" "$plugin/build/$plugin.cs3"
              elif [ -f "$GITHUB_WORKSPACE/builds/${plugin}-debug.cs3" ]; then
                cp "$GITHUB_WORKSPACE/builds/${plugin}-debug.cs3" "$plugin/build/${plugin}-debug.cs3"
              else
                cp $GITHUB_WORKSPACE/builds/*$plugin*.cs3 "$plugin/build/" 2>/dev/null || true
              fi
            fi
          done

          # Langkah 2: Hanya membangun kompilasi ulang pada provider yang berubah saja
          for plugin in $plugins; do
            echo "======================="
            echo "Building $plugin"
            echo "======================="

            ./gradlew ":$plugin:make"

            mkdir -p $GITHUB_WORKSPACE/builds
            find "$plugin/build" -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds \;
          done

          # Langkah 3: Membuat ulang metadata berkas perekam plugins.json secara penuh
          ./gradlew makePluginsJson
          cp build/plugins.json $GITHUB_WORKSPACE/builds/

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds

          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          git add .
          git commit -m "Build updated plugins: ${{ steps.changed.outputs.plugins }} ($GITHUB_SHA)" || exit 0
          git push
