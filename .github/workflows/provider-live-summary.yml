name: Provider Live Summary

on:
  workflow_dispatch:
  schedule:
    - cron: "20 5 * * 1"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/provider_live_summary.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provider-live-summary
          path: |
            provider-live-summary.json
            provider-live-summary.md
